delays:
  booking:
    base_min: 1.0
    base_max: 2.5
  airbnb:
    base_min: 1.5
    base_max: 3.5
  human_break_chance: 0.03   # 3% chance of long pause
  human_break_min: 5.0
  human_break_max: 15.0

retry:
  max_retries: 3
  backoff_base: 2.0          # Exponential backoff multiplier
  backoff_max: 120.0

session:
  csrf_refresh_interval: 30  # Refresh CSRF token every N requests
  full_refresh_interval: 100 # Full Playwright re-bootstrap every N requests

proxy:
  enabled: false
  rotate_on_error: true

curl_cffi:
  impersonate: "chrome131"
  timeout: 30

business_data:
  booking:
    enabled: true        # Inline HTML parse during detail-page enrichment — ~no extra cost
  airbnb:
    enabled: true        # Playwright modal open — adds 3-6s per listing
    timeout_seconds: 15  # Per-listing cap for modal interaction
    concurrency: 2       # Parallel Playwright pages (keep low; browser is heavy)
